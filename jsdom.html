<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Js Dom </title>
</head>
<body id="body">
    <h2 id="headingid">Student Registration Form</h2>
    <input value="Enter Your Name"/>
    <button id="ton">Proceed</button> 
    <p id="text">Lorem ipsum dolor sit amet consectetur.</p>
</body>
<script>
    const button = document.getElementById("ton");
    const body = document.getElementById("body");

    button.addEventListener("click", () => {
        button.style.color = "yellow";
         body.style.backgroundColor = "black";
        button.disabled = true;
    });
</script>
</html>
